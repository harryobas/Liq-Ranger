name: Build and Deploy Liquidation Ranger

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/liq-ranger
  GRAFANA_IMAGE_NAME: "grafana/grafana:latest"
  RUST_LOG: ${{ secrets.RUST_LOG }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            **/target
            **/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust
        run: rustup update stable && rustup default stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:latest,${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml and deploy.sh to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,deploy.sh,provisioning/"
          target: /root/liq-ranger

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/liq-ranger

            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE_NAME }}:latest
            export RPC_URL="${{ secrets.RPC_URL }}"
            export PRIVATE_KEY="${{ secrets.PRIVATE_KEY }}"
            export RPC_URL_HTTP="${{ secrets.RPC_URL_HTTP }}"
            export GRAFANA_PASSWORD="${{ secrets.GRAFANA_PASSWORD }}"
            export GRAFANA_IMAGE="${{ env.GRAFANA_IMAGE_NAME }}"
            export RUST_LOG="${{ env.RUST_LOG }}"

            if [ -n "${{ env.GRAFANA_IMAGE_NAME }}" ]; then
              export GRAFANA_IMAGE="${{ env.GRAFANA_IMAGE_NAME }}"
            else
              export GRAFANA_IMAGE="grafana/grafana:latest"
            fi

            mkdir -p data/sled_db
            chown -R 1000:472 data

            chmod  775 data
            chmod -R 775 data/sled_db

            # Ensure SQLite file exists and is readable by Grafana (UID 472)
            touch data/history.db
            chown 1000:472 data/history.db
            chmod 664 data/history.db

            # Provisioning directory only needs read/execute for root
            chmod -R 755 provisioning
            
            chmod +x deploy.sh
            ./deploy.sh